substitutions:
  _REGION: us-central1
  _SERVICE: freenotes-api
  _AR_REPO: freenotes
  # GCS bucket for attachments (create with infra/gcp/setup.sh or gsutil mb).
  _GCS_BUCKET: freenotes-491520-freenotes-data
  # SPA origin(s) for CORS + cookies — must match where the web app is hosted (not the API URL).
  # Example: https://my-app.web.app  (omit or leave empty to avoid overwriting Cloud Run env).
  _FRONTEND_ORIGIN: ""
  # Secret Manager *secret id* (not the value). Runtime loads the key via OPENAI_API_KEY_SECRET env.
  # Grant freenotes-api@PROJECT.iam.gserviceaccount.com secretAccessor on that secret.
  _OPENAI_SECRET_ID: "OPENAI_API_KEY_SECRET"

timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY

# Same value as runtime GOOGLE_CLIENT_ID — baked into the SPA at docker build time.
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: VITE_GOOGLE_CLIENT_ID

steps:
  # Must use bash so $VITE_GOOGLE_CLIENT_ID expands from secretEnv. Plain `args:` are not
  # shell-expanded — Docker was receiving the literal string "$VITE_GOOGLE_CLIENT_ID".
  - id: build-image
    name: gcr.io/cloud-builders/docker
    secretEnv: ["VITE_GOOGLE_CLIENT_ID"]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker build \
          --build-arg "VITE_GOOGLE_CLIENT_ID=$$VITE_GOOGLE_CLIENT_ID" \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}" \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest" \
          .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}"

  # Deploy to Cloud Run and set FRONTEND_ORIGIN to the service URL (CORS + cookies).
  # Requires Cloud Build SA: roles/run.admin, roles/iam.serviceAccountUser (on Run runtime SA).
  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run deploy "${_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --service-account "freenotes-api@${PROJECT_ID}.iam.gserviceaccount.com" \
          --set-env-vars "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GCS_BUCKET=${_GCS_BUCKET},NODE_ENV=production" \
          --set-secrets "SESSION_SECRET=SESSION_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest"
        if [[ -n "${_FRONTEND_ORIGIN}" ]]; then
          gcloud run services update "${_SERVICE}" --region="${_REGION}" \
            --update-env-vars "FRONTEND_ORIGIN=${_FRONTEND_ORIGIN}"
        fi
        if [[ -n "${_OPENAI_SECRET_ID}" ]]; then
          gcloud run services update "${_SERVICE}" --region="${_REGION}" \
            --update-env-vars "OPENAI_API_KEY_SECRET=${_OPENAI_SECRET_ID}"
        fi

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest"
